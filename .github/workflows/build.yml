name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get dependencies
        run: go mod download

      - name: Build Windows exe
        env:
          SKIP_WEB: "true"
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          $version = if ($env:GITHUB_REF -match 'v[\d]+\.[\d]+\.[\d]+') { $matches[0] } else { "v0.0.0" }
          $ldflags = "-w -s -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$version' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=local'"
          go build -o openlist-amd64.exe -ldflags=$ldflags -tags=jsoniter .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist-windows-amd64
          path: openlist-amd64.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get dependencies
        run: go mod download

      - name: Install musl-cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build Linux amd64
        env:
          SKIP_WEB: "true"
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: musl-gcc
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if ! [[ $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="v0.0.0"
          fi
          ldflags="-w -s -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=${VERSION}' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=local'"
          go build -o openlist-amd64 -ldflags="$ldflags" -tags=jsoniter .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist-linux-amd64
          path: openlist-amd64
          retention-days: 5

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: openlist-windows-amd64
          path: artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: openlist-linux-amd64
          path: artifacts

      - name: Create zip for Windows
        run: |
          cd artifacts
          cp openlist-windows-amd64 openlist.exe
          zip openlist-windows-amd64.zip openlist.exe

      - name: Create tar.gz for Linux
        run: |
          cd artifacts
          tar -czvf openlist-linux-amd64.tar.gz openlist-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/openlist-windows-amd64.zip
            artifacts/openlist-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
