name: Custom Build (Windows & Linux)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - windows-amd64
          - linux-amd64-musl
          - linux-arm64-musl
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Verify local frontend files
        run: |
          if [ -f "public/dist/index.html" ]; then
            echo "Using local frontend files from public/dist"
          else
            echo "ERROR: public/dist/index.html not found!"
            exit 1
          fi

      - name: Build
        uses: OpenListTeam/cgo-actions@v1.2.2
        with:
          targets: ${{ matrix.target }}
          musl-target-format: $os-$musl-$arch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          out-dir: build
          x-flags: |
            github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$built_at
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=xuebiya
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$git_commit
            github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$tag
            github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=local
          output: openlist$ext

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist_${{ steps.short-sha.outputs.sha }}_${{ matrix.target }}
          path: build/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "openlist*" -exec cp {} release/ \;
          cd release
          for f in openlist; do
            if [ -f "$f" ]; then
              chmod +x "$f"
              tar -czvf "${f}-linux.tar.gz" "$f"
              rm "$f"
            fi
          done
          for f in openlist.exe; do
            if [ -f "$f" ]; then
              zip "${f%.exe}-windows.zip" "$f"
              rm "$f"
            fi
          done
          ls -la

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}
          name: Build ${{ steps.date.outputs.date }}
          body: |
            自动构建版本 - 使用本地前端文件
            
            本构建使用仓库中的 public/dist 目录中的前端文件，不从网络拉取。
          files: release/*
          draft: false
          prerelease: false
