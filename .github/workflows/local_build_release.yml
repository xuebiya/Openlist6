name: Build and Release with Local Frontend

on:
  workflow_dispatch:
    inputs:
      release_title:
        description: 'Release Title'
        required: true
        default: 'Build Release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install dependencies
        run: |
          sudo snap install zig --classic --beta
          docker pull crazymax/xgo:latest
          go install github.com/crazy-max/xgo@latest
          sudo apt install upx

      - name: Verify local frontend files
        run: |
          if [ -f "public/dist/index.html" ]; then
            echo "Using local frontend files from public/dist"
          else
            echo "ERROR: public/dist/index.html not found!"
            exit 1
          fi

      - name: Build with local frontend
        run: |
          export SKIP_WEB=true
          bash build.sh release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## OpenList Release

            Built with local frontend files from public/dist.
          files: build/compress/*
          tag_name: build-$(date +'%Y%m%d-%H%M%S')
          generate_release_notes: true
